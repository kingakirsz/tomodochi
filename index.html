<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TomoDochi</title>

    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/scene.css">
    <link rel="stylesheet" href="css/menu.css">
    <link rel="stylesheet" href="css/windows.css">
</head>
<body>
    <nav id="app-menu">
        <div class="dropdown">
            <button class="menu-btn">File</button>
            <div class="dropdown-content" id="file-dropdown">
                <button class="dropdown-item" id="btn-export-save">💾 Save Game</button>
                <button class="dropdown-item" id="btn-import-save">📂 Load Game</button>
                <input type="file" id="import-file-input" accept=".json" style="display:none;">
            </div>
        </div>

        <div class="dropdown">
            <button class="menu-btn">View</button>
            <div class="dropdown-content" id="view-dropdown">
                <button class="dropdown-item" id="btn-new-list">➕ Add new list</button>
                    <hr class = "menu-separator">
                    <div id="lists-menu-container"></div>
            </div>
        </div>

        <button class="menu-btn">Shop</button>
        <button class="menu-btn">Stats</button>
        <button class="menu-btn">Help</button>
    </nav>
    <main id="app-container">
        <div id="scene">
            <div id="hud-container">
                <div class="hud-item energy-container">
                    <span class="hud-label">Energy</span>
                    <div class = "energy-bar-bg">
                        <div class="energy-bar-fill" id="hud-energy-fill"></div>
                    </div>
                </div>
                <div class="hud-item points-container">
                    <span class="hud-icon">⭐️</span>
                    <span id="hud-points-text">0</span>
                </div>
            </div>
            <div id="environment-bg" class="default-bg">
                <div id="pet" class="idle-animation"></div>
            </div>
            <div id="environment-ground" class="default-ground"></div>
        </div>

        <div id="desktop"></div>
    </main>

    <template id="todo-window-template">
        <div class="window" style="top: 50px; left: 100px;">
            <div class="window-header">
                <span class="window-title"></span>
                <button class="close-btn">X</button>
            </div>
            <div class="window-add-task">
                <input type="text" class="task-input" placeholder="Add Task"/>
                <button class="add-task-btn">+</button>
            </div>
            <div class="window-content"></div>
            <div class="resize-handle"></div>
        </div>
    </template>

    <template id="matrix-window-template">
        <div class="window" style="top: 50px; left: 450px; width: 400px; height: 400px;">
            <div class="window-header">
                <span class="window-title"></span>
                <button class="close-btn">X</button>
            </div>
            <div class="window-content matrix-grid">
                <div class="matrix-quadrant q1-container"><h4>Urgent & Important</h4></div>
                <div class="matrix-quadrant q2-container"><h4>Not Urgent & Important</h4></div>
                <div class="matrix-quadrant q3-container"><h4>Urgent & Unimportant</h4></div>
                <div class="matrix-quadrant q4-container"><h4>Not Urgent & Unimportant</h4></div>
            </div>
            <div class="resize-handle"></div>
        </div>
    </template>

    <template id="kanban-window-template">
        <div class="window" style="top: 50px; left: 880px; width: 450px; height: 350px;">
            <div class="window-header">
                <span class="window-title"></span>
                <button class="close-btn">X</button>
            </div>
            <div class="window-content kanban-content" style="display: flex; gap: 10px; padding: 10px; height: 100%;">
                <div class="kanban-column">
                    <h4 class="kanban-header">To Do</h4>
                    <div class="kanban-todo kanban-dropzone"></div>
                </div>
                <div class="kanban-column">
                    <h4 class="kanban-header">In Progress</h4>
                    <div class="kanban-in-progress kanban-dropzone"></div>
                </div>
                <div class="kanban-column">
                    <h4 class="kanban-header">Done</h4>
                    <div class="kanban-done kanban-dropzone"></div>
                </div>
            </div>
            <div class="resize-handle"></div>
        </div>
    </template>

    <template id="task-details-modal-template">
        <div class="modal-overlay">
            <div class="window modal-window">
                <div class="window-header">
                    <span class="window-title">Edit Task</span>
                    <button class="close-btn close-modal-btn">X</button>
                </div>
                <div class="window-content modal-content-area">
                    <div class="form-group">
                        <label>Title</label>
                        <input type="text" class="task-input modal-title-input" placeholder="Task title"/>
                    </div>

                    <div class ="form-row">
                        <div class="form-group">
                            <label>Category</label>
                            <select class="task-input modal-category-select">
                                <option value="None">None</option>
                                <option value="Chores">Chores</option>
                                <option value="Study">Study</option>
                                <option value="Hobby">Hobby</option>
                                <option value="Social">Social</option>
                                <option value="Wellness">Wellness</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Difficulty: <span class="difficulty-value"></span></label>
                            <input type="range" min="1" max="10" value="1" class="modal-difficulty-slider"/>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Due Date</label>
                            <input type="date" class="task-input modal-date-input"/>
                        </div>
                        <div class="form-group">
                            <label>Due Time</label>
                            <input type="time" class="task-input modal-time-input"/>
                        </div>
                    </div>

                    <div class="form-group" style="margin-top: 10px;">
                        <label>Subtasks</label>
                        <div style="display: flex; gap: 5px;">
                            <input type="text" class="task-input modal-subtask-input" placeholder="Add subtask..." />
                            <button class="add-task-btn modal-add-subtask-btn" style="width: auto; padding: 0 10px; font-size: 14px;">Add</button>
                        </div>
                        <div class="modal-subtasks-list" style="margin-top: 10px; display: flex; flex-direction: column; gap: 5px;">
                        </div>
                    </div>

                    <button class="menu-btn save-modal-btn" style="width: 100%; margin-top: 15px;">Save Changes</button>
                </div>
            </div>
        </div>
    </template>
    <script type="module" src="js/app.js"></script>
</body>
</html>
